<!-- @dsCard group="Colors" viewport="700x150" name="Evidence / Paper" subtitle="Off-white memo + data pages" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:18px;background:#fff}.row{display:flex;gap:0;border:1px solid var(--gray-150)}.sw{flex:1;height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;border-right:1px solid var(--gray-150)}.sw:last-child{border-right:0}.n{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;color:var(--ink-900);text-transform:uppercase}.h{font-family:var(--font-mono);font-size:9px;color:var(--gray-500)}</style></head>
<body><div class="row">
<div class="sw" style="background:var(--paper-050)"><div class="n">Page</div><div class="h">#F6F6F2</div></div>
<div class="sw" style="background:var(--paper-000)"><div class="n">Panel</div><div class="h">#FFFFFF</div></div>
<div class="sw" style="background:var(--paper-100)"><div class="n">Sunk</div><div class="h">#EFEFEA</div></div>
<div class="sw" style="background:var(--ink-900)"><div class="n" style="color:#fff">Ink</div><div class="h" style="color:rgba(255,255,255,.5)">#0A0C0F</div></div>
</div></body></html>
