<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">

<body><div class="row">

<div class="col"><div class="bar" style="width:24px"></div><div class="t">5 · 24</div></div>
<div class="col"><div class="bar" style="width:32px"></div><div class="t">6 · 32</div></div>
<div class="col"><div class="bar" style="width:48px"></div><div class="t">7 · 48</div></div>
<div class="col"><div class="bar" style="width:64px"></div><div class="t">8 · 64</div></div>

</div></body></html>
