<!-- @dsCard group="Motion" viewport="700x200" name="Easing & pacing" subtitle="Decisive settle, no bounce — thesis first, evidence follows" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:22px 26px;background:#0B0D10;color:#F5F6F8;font-family:var(--font-mono)}.lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--gray-400);margin-bottom:10px}.track{height:6px;background:var(--obsidian-700);border-radius:999px;position:relative;margin-bottom:18px}.dot{position:absolute;top:-4px;width:14px;height:14px;border-radius:999px;background:var(--accent);left:0;animation:run 2.6s infinite}.r1{animation-timing-function:cubic-bezier(0.16,1,0.3,1)}.r2{animation-timing-function:cubic-bezier(0.77,0,0.175,1)}.r3{animation-timing-function:cubic-bezier(0.4,0,0.1,1)}@keyframes run{0%{left:0}45%{left:calc(100% - 14px)}55%{left:calc(100% - 14px)}100%{left:0}}.n{font-size:10px;color:var(--gray-500);display:flex;justify-content:space-between}</style></head>
<body>
<div class="lbl">ease-stage · settle</div><div class="track"><div class="dot r1"></div></div>
<div class="lbl">ease-mask · reveal</div><div class="track"><div class="dot r2"></div></div>
<div class="lbl">ease-draw · timeline</div><div class="track"><div class="dot r3"></div></div>
<div class="n"><span>420ms base</span><span>720ms slow</span><span>1100ms reveal</span><span>1400ms count</span></div>
</body></html>
