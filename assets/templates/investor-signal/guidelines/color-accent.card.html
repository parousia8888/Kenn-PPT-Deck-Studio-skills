<!-- @dsCard group="Colors" viewport="700x170" name="Accent — one per deck" subtitle="Vermilion (default), Cobalt, Chartreuse — marks signal, not decoration" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:18px;background:#0B0D10}.row{display:flex;gap:14px}.sw{flex:1;height:108px;border-radius:2px;display:flex;flex-direction:column;justify-content:space-between;padding:10px 12px}.n{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase}.big{font-family:var(--font-display);font-weight:800;font-size:30px;letter-spacing:-.02em}</style></head>
<body><div class="row">
<div class="sw" style="background:var(--vermilion)"><div class="n" style="color:#fff">Electric Vermilion</div><div class="big" style="color:#fff">+218%</div><div class="n" style="color:rgba(255,255,255,.7)">#FB3B1E</div></div>
<div class="sw" style="background:var(--cobalt)"><div class="n" style="color:#fff">Cobalt</div><div class="big" style="color:#fff">+218%</div><div class="n" style="color:rgba(255,255,255,.7)">#2D5BE3</div></div>
<div class="sw" style="background:var(--chartreuse)"><div class="n" style="color:#0A0C0F">Acid Chartreuse</div><div class="big" style="color:#0A0C0F">+218%</div><div class="n" style="color:rgba(10,12,15,.65)">#C2F23C</div></div>
</div></body></html>
