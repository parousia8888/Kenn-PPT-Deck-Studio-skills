<!-- @dsCard group="Spacing" viewport="700x170" name="Radius, rules & frame depth" subtitle="Sharp corners, hairline rules, one controlled shadow" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:24px 26px;background:#0B0D10;color:#F5F6F8;display:flex;gap:26px;align-items:center}.box{width:120px;height:84px;background:var(--obsidian-700);border:1px solid var(--obsidian-600);display:flex;align-items:flex-end;padding:8px}.t{font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;color:var(--gray-400)}</style></head>
<body>
<div class="box" style="border-radius:0"><div class="t">r0 · default</div></div>
<div class="box" style="border-radius:2px"><div class="t">r1 · control</div></div>
<div class="box" style="border-radius:8px"><div class="t">r3 · frame</div></div>
<div class="box" style="border:none;box-shadow:var(--shadow-frame)"><div class="t">frame depth</div></div>
</body></html>
