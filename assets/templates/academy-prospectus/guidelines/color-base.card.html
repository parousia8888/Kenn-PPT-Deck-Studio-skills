<!-- @dsCard group="Colors" viewport="700x150" name="Base · Paper & Parchment" subtitle="Warm white, porcelain, parchment, deep paper, ink surface" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 html,body{margin:0;background:var(--paper);font-family:var(--font-meta);}
 .row{display:flex;gap:0;padding:20px;}
 .sw{flex:1;height:108px;border-radius:var(--r-sm);margin-right:10px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;box-sizing:border-box;border:1px solid var(--line);}
 .sw:last-child{margin-right:0;}
 .n{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;}
 .h{font-size:9.5px;opacity:0.6;margin-top:2px;}
 .dark .n,.dark .h{color:var(--ink-on-dark);}
</style></head>
<body><div class="row">
 <div class="sw" style="background:var(--paper)"><span class="n">Paper</span><span class="h">#FAF6EF</span></div>
 <div class="sw" style="background:var(--porcelain)"><span class="n">Porcelain</span><span class="h">#F3ECE0</span></div>
 <div class="sw" style="background:var(--parchment)"><span class="n">Parchment</span><span class="h">#EBE1CF</span></div>
 <div class="sw" style="background:var(--paper-deep)"><span class="n">Paper Deep</span><span class="h">#E3D8C3</span></div>
 <div class="sw dark" style="background:var(--paper-ink)"><span class="n">Ink Surface</span><span class="h">#211E1A</span></div>
</div></body></html>
