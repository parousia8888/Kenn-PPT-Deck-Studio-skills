<!-- @dsCard group="Colors" viewport="700x150" name="Ink · Text Scale" subtitle="Soft black through faint metadata grey, plus text-on-dark" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 html,body{margin:0;background:var(--paper);font-family:var(--font-meta);}
 .row{display:flex;padding:20px;gap:10px;}
 .sw{flex:1;height:108px;border-radius:var(--r-sm);display:flex;flex-direction:column;justify-content:flex-end;padding:10px;box-sizing:border-box;}
 .n{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-on-dark);}
 .h{font-size:9.5px;opacity:0.65;margin-top:2px;color:var(--ink-on-dark);}
 .lt .n,.lt .h{color:var(--ink);}
</style></head>
<body><div class="row">
 <div class="sw" style="background:var(--ink)"><span class="n">Ink</span><span class="h">#221F1A</span></div>
 <div class="sw" style="background:var(--charcoal)"><span class="n">Charcoal</span><span class="h">#3B362E</span></div>
 <div class="sw" style="background:var(--ink-muted)"><span class="n">Muted</span><span class="h">#6C6457</span></div>
 <div class="sw" style="background:var(--ink-faint)"><span class="n">Faint</span><span class="h">#978D7D</span></div>
 <div class="sw lt" style="background:var(--ink-on-dark);border:1px solid var(--line)"><span class="n">On-Dark</span><span class="h">#F1E9DA</span></div>
</div></body></html>
