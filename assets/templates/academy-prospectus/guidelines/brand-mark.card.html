<!-- @dsCard group="Brand" viewport="700x180" name="Institution Mark" subtitle="Initial-in-circle glyph + wordmark lockup" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 html,body{margin:0;background:var(--paper);}
 .wrap{padding:28px;display:flex;gap:40px;align-items:center;}
 .lock{display:flex;align-items:center;gap:14px;}
 .glyph{width:48px;height:48px;display:grid;place-items:center;border:1.8px solid var(--terracotta);border-radius:50%;color:var(--terracotta);font-family:var(--font-display);font-size:24px;font-weight:600;font-style:italic;}
 .word{font-family:var(--font-display);font-weight:500;font-size:30px;letter-spacing:-0.01em;color:var(--ink);line-height:1;}
 .sub{font-family:var(--font-meta);font-size:9.5px;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink-faint);margin-top:5px;}
 .dark{background:var(--paper-ink);padding:18px 22px;border-radius:var(--r-md);}
 .dark .glyph{border-color:var(--gold);color:var(--gold);}
 .dark .word{color:var(--ink-on-dark);}
</style></head>
<body><div class="wrap">
 <div class="lock"><span class="glyph">L</span><div><div class="word">Linden Academy</div><div class="sub">Language · Thought · Character</div></div></div>
 <div class="dark"><div class="lock"><span class="glyph">L</span><div><div class="word">Linden Academy</div><div class="sub">Est. 1994</div></div></div></div>
</div></body></html>
