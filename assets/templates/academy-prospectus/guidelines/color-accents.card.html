<!-- @dsCard group="Colors" viewport="700x180" name="Accents · Section Identities" subtitle="Terracotta, forest, navy, gold — each owns a chapter" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 html,body{margin:0;background:var(--paper);font-family:var(--font-meta);}
 .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:20px;}
 .col{display:flex;flex-direction:column;gap:6px;}
 .pair{display:flex;height:70px;border-radius:var(--r-sm);overflow:hidden;}
 .pair .deep{width:34%;}
 .field{height:30px;border-radius:var(--r-sm);border:1px solid var(--line);}
 .lab{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink);}
 .hx{font-size:9px;color:var(--ink-faint);}
</style></head>
<body><div class="grid">
 <div class="col"><div class="pair"><div style="flex:1;background:var(--terracotta)"></div><div class="deep" style="background:var(--terracotta-deep)"></div></div><div class="field" style="background:var(--terracotta-field)"></div><span class="lab">Terracotta</span><span class="hx">#B05C3B · field #F1E4DA</span></div>
 <div class="col"><div class="pair"><div style="flex:1;background:var(--forest)"></div><div class="deep" style="background:var(--forest-deep)"></div></div><div class="field" style="background:var(--forest-field)"></div><span class="lab">Forest</span><span class="hx">#3C5A45 · field #E2E9E1</span></div>
 <div class="col"><div class="pair"><div style="flex:1;background:var(--navy)"></div><div class="deep" style="background:var(--navy-deep)"></div></div><div class="field" style="background:var(--navy-field)"></div><span class="lab">Navy</span><span class="hx">#324A63 · field #DFE5EA</span></div>
 <div class="col"><div class="pair"><div style="flex:1;background:var(--gold)"></div><div class="deep" style="background:var(--gold-deep)"></div></div><div class="field" style="background:var(--gold-field)"></div><span class="lab">Gold</span><span class="hx">#A98545 · field #F1E8D4</span></div>
</div></body></html>
