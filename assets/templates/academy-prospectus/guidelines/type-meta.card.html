<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 html,body{margin:0;background:var(--paper);}
 .wrap{padding:26px 28px;display:flex;flex-direction:column;gap:16px;}
 .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
 .label{font-family:var(--font-meta);font-size:12.5px;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink-faint);}
 .chip{font-family:var(--font-meta);font-size:11.5px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--terracotta-deep);background:var(--terracotta-field);border:1px solid color-mix(in srgb,var(--terracotta) 22%,transparent);border-radius:999px;padding:6px 13px;}
 .tag{font-family:var(--font-meta);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-faint);}
</style></head>
<body><div class="wrap">
 <span class="label">Module · LA · 309 — Rhetoric &amp; Debate</span>
 <div class="row"><span class="chip">LA · 101</span><span class="chip">Ages 14–17</span><span class="chip">120 min</span><span class="chip">3 Levels</span></div>
