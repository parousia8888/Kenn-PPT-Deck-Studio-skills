<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing · 8px Rhythm" subtitle="From 4px hairline gaps to 128px section air" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 html,body{margin:0;background:var(--paper);font-family:var(--font-meta);}
 .wrap{padding:24px 28px;display:flex;align-items:flex-end;gap:14px;}
 .u{display:flex;flex-direction:column;align-items:center;gap:8px;}
 .bar{background:var(--terracotta);border-radius:2px;width:26px;}
 .n{font-size:10px;color:var(--ink-faint);letter-spacing:0.08em;}
</style></head>
<body><div class="wrap">
 <div class="u"><div class="bar" style="height:4px"></div><span class="n">4</span></div>
 <div class="u"><div class="bar" style="height:8px"></div><span class="n">8</span></div>
 <div class="u"><div class="bar" style="height:12px"></div><span class="n">12</span></div>
 <div class="u"><div class="bar" style="height:16px"></div><span class="n">16</span></div>
 <div class="u"><div class="bar" style="height:24px"></div><span class="n">24</span></div>
 <div class="u"><div class="bar" style="height:32px"></div><span class="n">32</span></div>
 <div class="u"><div class="bar" style="height:48px"></div><span class="n">48</span></div>
 <div class="u"><div class="bar" style="height:64px"></div><span class="n">64</span></div>
 <div class="u"><div class="bar" style="height:96px"></div><span class="n">96</span></div>
</div></body></html>
