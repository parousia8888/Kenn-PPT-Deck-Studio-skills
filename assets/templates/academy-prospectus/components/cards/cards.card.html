<!-- @dsCard group="Components" viewport="700x440" name="Cards · Teacher, Outcome, Testimonial, Plan" subtitle="Editorial content cards for the prospectus" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Card components</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html,body{margin:0;background:var(--paper);}
  .wrap{padding:30px 34px;font-family:var(--font-body);display:grid;grid-template-columns:200px 1fr;gap:28px;align-items:start;}
  .col{display:flex;flex-direction:column;gap:18px;}
  .lbl{font-family:var(--font-meta);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:8px;}
  .kpis{display:flex;gap:34px;}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { TeacherCard, OutcomeStat, TestimonialCard, PlanCard } = window.AcademyProspectusDesignSystem_9696cb;
    function Demo() {
      return (
        <div className="wrap">
          <div className="col" data-accent="forest">
            <span className="lbl">Teacher</span>
            <TeacherCard name="Dr. Elena Voss" discipline="Director · Linguistics"
              bio="PhD Cambridge. Twenty years shaping how language is taught with rigour and warmth." />
          </div>
          <div className="col">
            <div data-accent="navy">
              <span className="lbl">Outcomes</span>
              <div className="kpis">
                <OutcomeStat value="94" unit="%" caption="reached their target exam grade in two terms" source="Cohort 2024–25 · n=312" />
                <OutcomeStat value="+2.1" caption="average IELTS band gain in a single year" source="Verified by examiners" />
              </div>
            </div>
            <div data-accent="terracotta" style={{marginTop:18}}>
              <span className="lbl">Testimonial</span>
              <TestimonialCard quote="She left able to argue a case in front of a room — and to enjoy it."
                name="Mrs. Chen Wei" role="Parent · Hangzhou" />
            </div>
            <div data-accent="gold" style={{marginTop:18}}>
              <span className="lbl">Plan</span>
              <div style={{maxWidth:300}}>
                <PlanCard tier="Scholar · Most chosen" price="¥ 11,400" feature
                  items={["Four seminars each week","One-to-one mentor hour","Examination studio access"]} />
              </div>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
</body>
</html>
