<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Testimonial — Academy Prospectus</title>
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="prospectus-slides.css">
<style> html,body{margin:0;} </style>
</head>
<body class="single-slide">
  <section class="slide l-testimonial" data-anim="testimonial" data-accent="terracotta" data-screen-label="Testimonial">
    <div class="story-img">
      <div class="img-frame"><div class="img-ph" data-label="Mei-Ling, class of 2023"><span class="lens"></span></div></div>
    </div>
    <div class="quote-side">
      <span class="mark-q" data-animate>&ldquo;</span>
      <div class="quote">
        <span class="qline" data-animate style="--step:0">My daughter arrived shy and</span>
        <span class="qline" data-animate style="--step:1">unsure of her English. She left</span>
        <span class="qline" data-animate style="--step:2">able to <span class="t-serif-italic">argue a case</span> in front of</span>
        <span class="qline" data-animate style="--step:3">a room — and to enjoy it.</span>
      </div>
      <div class="attribution" data-animate data-part="attr">
        <div style="width:46px; height:46px; border-radius:50%; overflow:hidden; flex:none"><div class="img-ph" data-label=""></div></div>
        <div>
          <div class="who">Mrs. Chen Wei</div>
          <div class="role">Parent · Hangzhou Campus</div>
        </div>
      </div>
    </div>
  </section>
  <script src="prospectus-motion.js"></script>
</body>
</html>
