<!-- @dsCard group="Slides" viewport="1280x720" name="01 · Institution Cover" subtitle="Title blooms like ink; mark and image settle last" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Cover — Academy Prospectus</title>
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="prospectus-slides.css">
<style> html,body{margin:0;} </style>
</head>
<body class="single-slide">
  <section class="slide l-cover" data-anim="prospectus-cover" data-accent="terracotta" data-screen-label="Cover">
    <div class="cover-text">
      <div class="established" data-animate data-part="mark">Established 1994 · Hangzhou & Singapore</div>
      <div>
        <div class="eyebrow" data-animate data-part="mark" style="--step:0">Academy Prospectus 2026</div>
        <h1 class="t-hero" data-animate data-part="title" style="margin:22px 0 0">Linden<br>Academy</h1>
        <div class="t-lead t-serif-italic" data-animate data-part="title" style="color:var(--ink-muted); margin-top:18px">林登语言与人文学院</div>
      </div>
      <div class="slide-rail" style="border:none; padding:0" data-animate data-part="mark">
        <span class="mark"><span class="glyph">L</span> A school of language, thought &amp; character</span>
      </div>
    </div>
    <div class="cover-img">
      <div class="img-frame" data-animate data-part="image">
        <div class="img-ph" data-label="Cover · the reading hall, autumn light"><span class="lens"></span></div>
      </div>
    </div>
  </section>
  <script src="prospectus-motion.js"></script>
</body>
</html>
