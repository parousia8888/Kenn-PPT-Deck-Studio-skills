<!-- @dsCard group="Components" viewport="700x460" name="Core — Button, Badge, Card" subtitle="Actions, labels and concept cards" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  html,body{margin:0;background:var(--paper-base);}
  .wrap{padding:28px 30px;font-family:var(--font-sans);color:var(--ink);}
  .row{display:flex;flex-wrap:wrap;gap:14px;align-items:center;margin-bottom:22px;}
  .sec{font-family:var(--font-mono);font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--graphite-mute);margin:0 0 12px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
</style>
</head>
<body>
<div class="wrap" id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" data-presets="react">
  const { Button, Badge, Card } = window.CourseCanvasDesignSystem_019e16;
  function Demo() {
    return (
      <React.Fragment>
        <p className="sec">Buttons</p>
        <div className="row">
          <Button variant="primary">Begin lesson</Button>
          <Button variant="secondary">Skip</Button>
          <Button variant="sage">Mark complete</Button>
          <Button variant="ghost">Teacher notes</Button>
          <Button variant="primary" disabled>Disabled</Button>
        </div>
        <div className="row">
          <Button variant="primary" size="sm">Small</Button>
          <Button variant="primary" size="md">Medium</Button>
          <Button variant="primary" size="lg">Large</Button>
        </div>

        <p className="sec">Badges &amp; tags</p>
        <div className="row">
          <Badge variant="ox">Lesson 04</Badge>
          <Badge variant="ink">Unit II</Badge>
          <Badge variant="sage">Example</Badge>
          <Badge variant="straw">Key term</Badge>
          <Badge variant="ok">Mastered</Badge>
          <Badge variant="error">Revisit</Badge>
          <Badge variant="ghost" level={1}>Intro</Badge>
          <Badge variant="ghost" level={2}>Core</Badge>
          <Badge variant="ghost" level={3}>Stretch</Badge>
        </div>

        <p className="sec">Concept cards</p>
        <div className="grid2">
          <Card kicker="Branch B — Parameters" title="The two numbers" accent="sage">
            <p style={{margin:'8px 0 0',color:'var(--graphite)',fontSize:'15px',lineHeight:1.5}}>Mean μ sets the center; standard deviation σ sets the width.</p>
          </Card>
          <Card kicker="Definition · n." title="Normal distribution" accent="ox">
            <p style={{margin:'8px 0 0',color:'var(--graphite)',fontSize:'15px',lineHeight:1.5}}>A symmetric, bell-shaped spread set by just μ and σ.</p>
          </Card>
        </div>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
</body>
</html>
