<!-- @dsCard group="Colors" viewport="700x170" name="Accent trio" subtitle="Oxblood, chalk sage, pale straw — each with its tint" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--paper-base);}
  .wrap{padding:16px 18px;font-family:var(--font-mono);}
  .grp{display:flex;gap:8px;margin-bottom:10px;align-items:stretch;}
  .lab{width:88px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--graphite-mute);display:flex;align-items:center;}
  .sw{flex:1;height:40px;border-radius:3px;display:flex;align-items:center;padding:0 10px;font-size:11px;}
</style></head>
<body>
<div class="wrap">
  <div class="grp"><div class="lab">Oxblood</div>
    <div class="sw" style="background:var(--oxblood);color:#fff">#8A2D22</div>
    <div class="sw" style="background:var(--oxblood-deep);color:#fff">deep</div>
    <div class="sw" style="background:var(--oxblood-tint);color:var(--oxblood-deep)">tint</div>
  </div>
  <div class="grp"><div class="lab">Sage</div>
    <div class="sw" style="background:var(--sage);color:#fff">#5E7257</div>
    <div class="sw" style="background:var(--sage-deep);color:#fff">deep</div>
    <div class="sw" style="background:var(--sage-tint);color:var(--sage-deep)">tint</div>
  </div>
  <div class="grp"><div class="lab">Straw</div>
    <div class="sw" style="background:var(--straw);color:var(--ink-soft)">#E7CD80</div>
    <div class="sw" style="background:var(--straw-soft);color:var(--ink-soft)">soft</div>
    <div class="sw" style="background:var(--straw-deep);color:#fff">deep</div>
  </div>
</div>
</body></html>
