<!-- @dsCard group="Type" viewport="700x260" name="Type scale" subtitle="Fixed deck ramp, 24px floor for projection" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--paper-base);}
  .wrap{padding:18px 24px;color:var(--ink);}
  .r{display:flex;align-items:baseline;gap:16px;border-bottom:1px solid var(--rule);padding:7px 0;}
  .r .n{font-family:var(--font-mono);font-size:11px;color:var(--graphite-mute);width:120px;flex:none;}
  .r .s{font-family:var(--font-display);color:var(--ink);line-height:1;white-space:nowrap;overflow:hidden;}
</style></head>
<body>
<div class="wrap">
  <div class="r"><span class="n">display · 88</span><span class="s" style="font-size:44px;font-weight:600">Course cover</span></div>
  <div class="r"><span class="n">h1 · 60</span><span class="s" style="font-size:34px;font-weight:600">Chapter title</span></div>
  <div class="r"><span class="n">h2 · 42</span><span class="s" style="font-size:27px;font-weight:600">Section heading</span></div>
  <div class="r"><span class="n">lead · 26</span><span class="s" style="font-size:21px;font-family:var(--font-sans)">Lead paragraph</span></div>
  <div class="r"><span class="n">body · 22 (floor)</span><span class="s" style="font-size:18px;font-family:var(--font-sans)">Teaching body text</span></div>
</div>
</body></html>
