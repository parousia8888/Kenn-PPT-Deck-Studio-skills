<!-- @dsCard group="Colors" viewport="700x150" name="Ink & graphite" subtitle="Text scale from warm near-black to faint metadata" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--paper-base);}
  .row{display:flex;gap:0;height:150px;font-family:var(--font-mono);}
  .sw{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;box-sizing:border-box;color:var(--paper-raised);}
  .sw b{font-size:12px;font-weight:500;letter-spacing:.04em;}
  .sw span{font-size:11px;opacity:.7;}
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:var(--ink)"><b>Ink</b><span>#211D18</span></div>
  <div class="sw" style="background:var(--ink-soft)"><b>Ink soft</b><span>#36302A</span></div>
  <div class="sw" style="background:var(--graphite)"><b>Graphite</b><span>#4E4840</span></div>
  <div class="sw" style="background:var(--graphite-mute)"><b>Graphite mute</b><span>#837A6D</span></div>
  <div class="sw" style="background:var(--graphite-faint);color:var(--ink)"><b>Faint</b><span>#A89E8E</span></div>
</div>
</body></html>
