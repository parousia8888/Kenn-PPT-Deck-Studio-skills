<!-- @dsCard group="Type" viewport="700x210" name="Body sans — Inter" subtitle="Highly legible teaching text; Windows-safe stack" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--paper-base);}
  .wrap{padding:20px 24px;color:var(--ink);font-family:var(--font-sans);}
  .meta{font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--graphite-mute);margin-bottom:12px;}
  .lead{font-size:21px;line-height:1.4;font-weight:500;margin:0 0 8px;}
  .body{font-size:16px;line-height:1.55;color:var(--graphite);margin:0;max-width:62ch;}
  .wts{display:flex;gap:18px;margin-top:12px;font-size:15px;}
  .wts span{color:var(--graphite-mute);}
</style></head>
<body>
<div class="wrap">
  <div class="meta">Inter · 400 / 500 / 600 / 700</div>
  <p class="lead">A z-score measures distance from the mean in σ units.</p>
  <p class="body">Subtract the mean, divide by the standard deviation, and read how far out a value sits — direction and scale both matter.</p>
  <div class="wts">
    <span style="font-weight:400">Regular</span><span style="font-weight:500">Medium</span><span style="font-weight:600">Semibold</span><span style="font-weight:700">Bold</span>
  </div>
</div>
</body></html>
