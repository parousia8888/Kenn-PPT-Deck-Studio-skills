<!-- @dsCard group="Colors" viewport="700x150" name="Paper & surfaces" subtitle="Warm bone canvas, raised card, sunken well, margin band" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--paper-base);}
  .row{display:flex;gap:0;height:150px;font-family:var(--font-mono);}
  .sw{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;box-sizing:border-box;}
  .sw b{font-size:12px;font-weight:500;letter-spacing:.04em;}
  .sw span{font-size:11px;color:var(--graphite-mute);}
  .b{border:1px solid var(--rule);}
</style></head>
<body>
<div class="row">
  <div class="sw b" style="background:var(--paper-base)"><b>Paper base</b><span>#F3EDE1</span></div>
  <div class="sw b" style="background:var(--paper-raised)"><b>Raised</b><span>#FBF7EE</span></div>
  <div class="sw b" style="background:var(--paper-sunken)"><b>Sunken</b><span>#E9E1D1</span></div>
  <div class="sw b" style="background:var(--paper-edge)"><b>Margin band</b><span>#EFE7D8</span></div>
</div>
</body></html>
