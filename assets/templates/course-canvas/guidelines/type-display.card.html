<!-- @dsCard group="Type" viewport="700x200" name="Display serif — Newsreader" subtitle="Chapter & slide titles; editorial italics" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--paper-base);}
  .wrap{padding:20px 24px;color:var(--ink);}
  .meta{font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--graphite-mute);margin-bottom:10px;}
  .d{font-family:var(--font-display);font-weight:600;font-size:52px;line-height:1.0;letter-spacing:-0.02em;margin:0;}
  .d em{font-style:italic;color:var(--oxblood);}
  .sub{font-family:var(--font-display);font-style:italic;font-weight:400;font-size:22px;color:var(--graphite);margin:10px 0 0;}
</style></head>
<body>
<div class="wrap">
  <div class="meta">Newsreader · 600 / italic · −0.02em</div>
  <h1 class="d">The Normal <em>Distribution</em></h1>
  <p class="sub">Why so many things gather around a middle.</p>
</div>
</body></html>
