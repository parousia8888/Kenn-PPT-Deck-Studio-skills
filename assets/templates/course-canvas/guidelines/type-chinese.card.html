<!-- @dsCard group="Type" viewport="700x230" name="Chinese — Noto Serif & Sans SC" subtitle="Cross-platform Chinese; never depends on macOS fonts" -->
<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--paper-base);}
  .wrap{padding:20px 24px;color:var(--ink);}
  .meta{font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--graphite-mute);margin-bottom:12px;}
  .serif{font-family:var(--font-serif);font-weight:600;font-size:36px;line-height:1.2;margin:0;}
  .sans{font-family:var(--font-sans);font-size:17px;line-height:1.6;color:var(--graphite);margin:10px 0 0;max-width:50ch;}
  .stk{font-family:var(--font-mono);font-size:11px;color:var(--graphite-mute);margin-top:14px;line-height:1.5;}
</style></head>
<body>
<div class="wrap">
  <div class="meta">编辑标题 Noto Serif SC · 正文 Noto Sans SC</div>
  <h1 class="serif">正态分布与标准分数</h1>
  <p class="sans">大多数结果都落在平均值附近；离中心越远，出现的可能性就越小。标准分数告诉我们一个数值距离平均值有几个标准差。</p>
  <div class="stk">serif: "Noto Serif SC", "SimSun", Georgia, serif<br>sans: "Inter", "Microsoft YaHei UI", "Noto Sans SC", sans-serif</div>
</div>
</body></html>
