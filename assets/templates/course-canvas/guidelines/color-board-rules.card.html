<!-- @dsCard group="Colors" viewport="700x150" name="Blackboard & rules" subtitle="Micro-diagram surface, chalk text, and hairline rules" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--paper-base);}
  .row{display:flex;height:150px;font-family:var(--font-mono);}
  .board{flex:1.3;background:var(--board);color:var(--chalk);padding:14px;box-sizing:border-box;display:flex;flex-direction:column;justify-content:space-between;}
  .board .t{font-family:var(--font-display);font-size:18px;}
  .board .chips{display:flex;gap:8px;font-size:11px;}
  .board .chips i{width:14px;height:14px;border-radius:3px;display:inline-block;}
  .rules{flex:1;padding:16px;box-sizing:border-box;display:flex;flex-direction:column;gap:14px;justify-content:center;}
  .rules div{font-size:11px;color:var(--graphite-mute);}
  .rules hr{margin:5px 0 0;border:0;}
</style></head>
<body>
<div class="row">
  <div class="board">
    <span class="t">Blackboard</span>
    <div class="chips">
      <span style="display:flex;gap:5px;align-items:center"><i style="background:var(--chalk)"></i>chalk</span>
      <span style="display:flex;gap:5px;align-items:center"><i style="background:var(--chalk-sage)"></i>sage</span>
      <span style="display:flex;gap:5px;align-items:center"><i style="background:var(--chalk-straw)"></i>straw</span>
    </div>
  </div>
  <div class="rules">
    <div>Hairline<hr style="border-top:1px solid var(--rule)"></div>
    <div>Strong divider<hr style="border-top:1px solid var(--rule-strong)"></div>
    <div>Ink rule<hr style="border-top:2px solid var(--rule-ink)"></div>
    <div>Oxblood mark<hr style="border-top:3px solid var(--oxblood);width:48px"></div>
  </div>
</div>
</body></html>
