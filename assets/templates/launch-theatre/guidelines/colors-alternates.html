<!-- @dsCard group="Colors" viewport="700x150" name="Alternate stage accents" subtitle="Swap --accent to give a launch its own light — pick one" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-stage); padding: 28px; }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; }
  .sw { height: 96px; display: flex; flex-direction: column; justify-content: flex-end; padding: 12px; border: 1px solid var(--hairline); }
  .n { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: #04140f; }
  .h { font-family: var(--font-mono); font-size: 10px; color: rgba(0,0,0,0.5); margin-top: 2px; }
</style></head><body>
<div class="row">
  <div class="sw" style="background:var(--signal)"><span class="n">Glacial cyan</span><span class="h">default</span></div>
  <div class="sw" style="background:var(--alt-orange)"><span class="n">Signal orange</span><span class="h">hardware</span></div>
  <div class="sw" style="background:var(--alt-green)"><span class="n">Laser green</span><span class="h">performance</span></div>
  <div class="sw" style="background:var(--alt-blue)"><span class="n">Titanium blue</span><span class="h">enterprise</span></div>
</div>
</body></html>
