<!-- @dsCard group="Spacing" viewport="700x220" name="Spacing scale" subtitle="4px base — generous, negative space is a material" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-stage); padding: 32px; }
  .row { display: flex; flex-direction: column; gap: 12px; }
  .item { display: flex; align-items: center; gap: 16px; }
  .bar { height: 14px; background: var(--accent); opacity: 0.85; }
  .lab { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; color: var(--text-muted); width: 120px; }
</style></head><body>
<div class="row">
  <div class="item"><span class="lab">space-2 · 8</span><span class="bar" style="width:8px"></span></div>
  <div class="item"><span class="lab">space-4 · 16</span><span class="bar" style="width:16px"></span></div>
  <div class="item"><span class="lab">space-5 · 24</span><span class="bar" style="width:24px"></span></div>
  <div class="item"><span class="lab">space-7 · 48</span><span class="bar" style="width:48px"></span></div>
  <div class="item"><span class="lab">space-9 · 96</span><span class="bar" style="width:96px"></span></div>
  <div class="item"><span class="lab">space-10 · 128</span><span class="bar" style="width:128px"></span></div>
  <div class="item"><span class="lab">space-12 · 224</span><span class="bar" style="width:224px"></span></div>
</div>
</body></html>
