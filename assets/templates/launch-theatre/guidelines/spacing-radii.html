<!-- @dsCard group="Spacing" viewport="700x170" name="Radii" subtitle="Cinematic = mostly hard edges; soft only for product frames" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-stage); padding: 32px; }
  .row { display: flex; gap: 24px; align-items: flex-end; }
  .box { width: 92px; height: 92px; background: var(--graphite-2); border: 1px solid var(--hairline-strong); }
  .lab { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-faint); margin-top: 10px; display: block; }
</style></head><body>
<div class="row">
  <div><div class="box" style="border-radius:var(--radius-none)"></div><span class="lab">none · 0</span></div>
  <div><div class="box" style="border-radius:var(--radius-xs)"></div><span class="lab">xs · 2</span></div>
  <div><div class="box" style="border-radius:var(--radius-sm)"></div><span class="lab">sm · 4</span></div>
  <div><div class="box" style="border-radius:var(--radius-md)"></div><span class="lab">md · 8</span></div>
  <div><div class="box" style="border-radius:var(--radius-lg)"></div><span class="lab">lg · 14</span></div>
  <div><div class="box" style="border-radius:var(--radius-pill)"></div><span class="lab">pill</span></div>
</div>
</body></html>
