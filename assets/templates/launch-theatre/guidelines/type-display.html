<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-stage); padding: 36px; }
  .spec { display: flex; flex-direction: column; gap: 18px; }
  .line { display: flex; align-items: baseline; gap: 18px; border-bottom: 1px solid var(--hairline); padding-bottom: 16px; }
  .tag { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-faint); width: 150px; flex: 0 0 auto; }
  .d { font-family: var(--font-display); color: var(--text-primary); line-height: 0.95; letter-spacing: -0.03em; }
</style></head><body>
<div class="spec">
  <div class="line"><span class="tag">Mega · 200</span><span class="d" style="font-weight:200;font-size:88px;letter-spacing:-0.045em">Aurora</span></div>
  <div class="line"><span class="tag">Hero · 200</span><span class="d" style="font-weight:200;font-size:60px">The product is the light.</span></div>
  <div class="line"><span class="tag">Display · 300</span><span class="d" style="font-weight:300;font-size:40px">One idea per slide.</span></div>
  <div class="line"><span class="tag">Title · 300</span><span class="d" style="font-weight:300;font-size:30px">Built for the stage</span></div>
</div>
</body></html>
