<!-- @dsCard group="Type" viewport="700x220" name="Mono — readouts & kicker" subtitle="JetBrains Mono. Versions, dates, model names, the act marker." -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-stage); padding: 36px; display: flex; flex-direction: column; gap: 26px; }
  .tag { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 12px; }
  .meta { display: flex; gap: 44px; }
  .meta dt { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-faint); }
  .meta dd { margin: 6px 0 0; font-family: var(--font-mono); font-size: 14px; letter-spacing: 0.04em; color: var(--text-primary); }
</style></head><body>
<div>
  <div class="tag">Kicker · tracked label + accent tick</div>
  <span class="lt-kicker">Product Reveal <span style="color:var(--text-faint);margin-left:8px">04 / 10</span></span>
</div>
<div>
  <div class="tag">Metadata readout</div>
  <dl class="meta">
    <div><dt>Model</dt><dd>LT-9 Aurora</dd></div>
    <div><dt>Version</dt><dd style="color:var(--accent)">v2.0</dd></div>
    <div><dt>Date</dt><dd>06 / 13 / 2026</dd></div>
    <div><dt>Latency</dt><dd>40 ms</dd></div>
  </dl>
</div>
</body></html>
