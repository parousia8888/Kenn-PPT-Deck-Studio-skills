<!-- @dsCard group="Colors" viewport="700x150" name="Graphite — structure" subtitle="Surfaces, chips, hairlines, dividers" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-stage); padding: 28px; }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; }
  .sw { height: 96px; display: flex; flex-direction: column; justify-content: flex-end; padding: 12px; border: 1px solid var(--hairline); }
  .n { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-primary); }
  .h { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); margin-top: 2px; }
</style></head><body>
<div class="row">
  <div class="sw" style="background:var(--graphite-1)"><span class="n">Graphite 1</span><span class="h">surface</span></div>
  <div class="sw" style="background:var(--graphite-2)"><span class="n">Graphite 2</span><span class="h">panel</span></div>
  <div class="sw" style="background:var(--graphite-3)"><span class="n">Graphite 3</span><span class="h">chip</span></div>
  <div class="sw" style="background:var(--graphite-4)"><span class="n">Graphite 4</span><span class="h">divider</span></div>
</div>
</body></html>
