<!-- @dsCard group="Colors" viewport="700x150" name="Light — type luminance" subtitle="Never pure white except a single peak" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-stage); padding: 28px; }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; }
  .sw { height: 96px; display: flex; flex-direction: column; justify-content: flex-end; padding: 12px; border: 1px solid var(--hairline); }
  .n { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--stage-0); }
  .h { font-family: var(--font-mono); font-size: 10px; color: rgba(0,0,0,0.5); margin-top: 2px; }
</style></head><body>
<div class="row">
  <div class="sw" style="background:var(--smoke)"><span class="n">Smoke</span><span class="h">faint</span></div>
  <div class="sw" style="background:var(--ash)"><span class="n">Ash</span><span class="h">muted</span></div>
  <div class="sw" style="background:var(--silver)"><span class="n">Silver</span><span class="h">secondary</span></div>
  <div class="sw" style="background:var(--soft-white)"><span class="n">Soft white</span><span class="h">primary</span></div>
  <div class="sw" style="background:var(--pure-white)"><span class="n">Pure white</span><span class="h">peak</span></div>
</div>
</body></html>
