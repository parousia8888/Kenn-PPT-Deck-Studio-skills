<!-- @dsCard group="Type" viewport="700x230" name="Font families" subtitle="Display / Body / Mono — all with Windows + CJK fallbacks" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-stage); padding: 36px; display: flex; flex-direction: column; gap: 20px; }
  .fam { display: flex; align-items: baseline; gap: 20px; border-bottom: 1px solid var(--hairline); padding-bottom: 18px; }
  .tag { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-faint); width: 120px; flex: 0 0 auto; }
  .name { font-size: 30px; color: var(--text-primary); }
  .stk { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); margin-top: 6px; }
</style></head><body>
<div class="fam"><span class="tag">Display</span><div><div class="name" style="font-family:var(--font-display);font-weight:300">Manrope · Aa Gg 2026</div><div class="stk">Manrope → Segoe UI → Microsoft YaHei UI → Noto Sans SC</div></div></div>
<div class="fam"><span class="tag">Body</span><div><div class="name" style="font-family:var(--font-body);font-weight:400">Hanken Grotesk · Aa Gg 2026</div><div class="stk">Hanken Grotesk → Segoe UI → Microsoft YaHei UI → Noto Sans SC</div></div></div>
<div class="fam" style="border:0"><span class="tag">Mono</span><div><div class="name" style="font-family:var(--font-mono);font-weight:400">JetBrains Mono · Aa 2026</div><div class="stk">JetBrains Mono → Cascadia Code → Consolas → Courier New</div></div></div>
</body></html>
