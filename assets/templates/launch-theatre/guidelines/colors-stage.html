<!-- @dsCard group="Colors" viewport="700x150" name="Stage blacks" subtitle="The void the product emerges from" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-stage); padding: 28px; }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; }
  .sw { height: 96px; display: flex; flex-direction: column; justify-content: flex-end; padding: 12px; border: 1px solid var(--hairline); }
  .n { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-primary); }
  .h { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); margin-top: 2px; }
</style></head><body>
<div class="row">
  <div class="sw" style="background:var(--stage-0)"><span class="n">Stage 0</span><span class="h">#000000</span></div>
  <div class="sw" style="background:var(--stage-1)"><span class="n">Stage 1</span><span class="h">#060709</span></div>
  <div class="sw" style="background:var(--stage-2)"><span class="n">Stage 2</span><span class="h">#0B0D10</span></div>
  <div class="sw" style="background:var(--stage-3)"><span class="n">Stage 3</span><span class="h">#101317</span></div>
</div>
</body></html>
