<!-- @dsCard group="Colors" viewport="700x180" name="Signal — the one accent" subtitle="Glacial cyan: reveals, progress, key moments only" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-stage); padding: 28px; }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; }
  .sw { height: 120px; display: flex; flex-direction: column; justify-content: flex-end; padding: 12px; border: 1px solid var(--hairline); }
  .n { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; }
  .h { font-family: var(--font-mono); font-size: 10px; margin-top: 2px; }
  .dark { color: #04181a; } .dark .h { color: rgba(0,0,0,0.55); }
  .light { color: var(--text-primary); } .light .h { color: var(--text-faint); }
</style></head><body>
<div class="row">
  <div class="sw dark" style="background:var(--signal);box-shadow:var(--glow-soft)"><span class="n">Signal</span><span class="h">#3BE0E6</span></div>
  <div class="sw dark" style="background:var(--signal-bright)"><span class="n">Bright</span><span class="h">#8AF4F7</span></div>
  <div class="sw light" style="background:var(--signal-dim)"><span class="n">Dim</span><span class="h">#1C9CA2</span></div>
  <div class="sw light" style="background:var(--signal-deep)"><span class="n">Deep</span><span class="h">#0B4F53 · track</span></div>
</div>
</body></html>
