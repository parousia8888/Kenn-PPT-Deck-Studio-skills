<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
  const { ScreenFrame, FeatureCell, StageNumber, ProgressRail } = window.LaunchTheatreDesignSystem_6e18c8;
  function Demo() {
    return (
      <div className="lt-on">
        <div className="grid">
          <div>
            <div className="lbl">ScreenFrame</div>
            <ScreenFrame label="LT-9 Console" ratio="16 / 10">
              <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", justifyContent: "flex-end", padding: 22 }}>
                <div style={{ fontFamily: "var(--font-display)", fontWeight: 200, fontSize: 34, letterSpacing: "-0.03em", color: "var(--text-primary)" }}>Aurora</div>
                <div style={{ fontFamily: "var(--font-mono)", fontSize: 11, letterSpacing: "0.18em", textTransform: "uppercase", color: "var(--accent)" }}>READY · 12ms</div>

        <div>

            <FeatureCell index={3} name="Private">Nothing ever leaves the device.</FeatureCell>

        </div>

          <div className="lbl">ProgressRail</div>
          <ProgressRail total={10} current={4} />
