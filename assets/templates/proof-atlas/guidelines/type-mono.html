<!-- @dsCard group="Type" viewport="700x200" name="Mono — JetBrains Mono" subtitle="Labels, coordinates, source IDs, timestamps, table headers" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--paper-0);font-family:var(--font-mono);}
  .wrap{padding:20px 24px;display:flex;flex-direction:column;gap:12px;}
  .line{display:flex;align-items:center;gap:14px;}
  .tag{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink);border:1px solid var(--rule);padding:4px 8px;background:var(--paper-pure);}
  .coord{font-size:11px;color:var(--blue);letter-spacing:0.06em;}
  .src{font-size:10.5px;color:var(--gray-2);letter-spacing:0.04em;}
  .ts{font-size:11px;color:var(--ink-2);letter-spacing:0.04em;}
  .cap{font-size:9.5px;letter-spacing:0.1em;text-transform:uppercase;color:var(--gray-3);}
</style>
</head>
<body>
  <div class="wrap">
    <div class="cap">Label · uppercase · 0.14em tracking</div>
    <div class="line">
      <span class="tag">Finding 03</span>
      <span class="tag">Methodology</span>
      <span class="tag" style="color:var(--blue);border-color:var(--blue)">Verified</span>
    </div>
    <div class="cap">Coordinate · source ID · timestamp</div>
    <div class="line">
      <span class="coord">[ 42.361°N · 071.057°W ]</span>
      <span class="src">SRC-2087 / fig.4</span>
      <span class="ts">2026-06-13 · 14:02 UTC</span>
    </div>
  </div>
</body>
</html>
