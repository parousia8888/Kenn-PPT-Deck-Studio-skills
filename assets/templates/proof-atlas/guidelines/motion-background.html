<!-- @dsCard group="Motion" viewport="700x220" name="Atlas Grid Background" subtitle="Live canvas field — coordinate lines, ticks, slow scan. Press B for static." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="../assets/atlas-anim.css">
<style>
  html,body{margin:0;background:var(--paper-0);height:220px;overflow:hidden;}
  .field{position:absolute;inset:0;}
  .overlay{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:space-between;padding:20px 24px;font-family:var(--font-mono);pointer-events:none;}
  .t{font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink);}
  .b{display:flex;justify-content:space-between;align-items:flex-end;}
  .c{font-size:10px;color:var(--blue);letter-spacing:0.06em;}
  .h{font-size:9.5px;color:var(--gray-2);letter-spacing:0.1em;text-transform:uppercase;}
</style>
</head>
<body>
  <div class="field" data-atlas-bg="cover"></div>
  <div class="overlay">
    <div class="t">Proof Atlas · coordinate field</div>
    <div class="b">
      <span class="c">[ 42.361°N · 071.057°W ]</span>
      <span class="h">canvas 2D · scan 14s · pauses in low-power</span>
    </div>
  </div>
  <script src="../assets/atlas-motion.js"></script>
</body>
</html>
