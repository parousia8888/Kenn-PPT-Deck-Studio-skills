<!-- @dsCard group="Brand" viewport="700x190" name="Evidence Cell & Source Note" subtitle="Every data point carries a labelled slot and a source line" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--paper-0);font-family:var(--font-body);}
  .wrap{padding:20px 24px;display:flex;gap:18px;}
  .cell{flex:1;background:var(--paper-pure);border:1px solid var(--rule);display:flex;flex-direction:column;}
  .hd{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;border-bottom:1px solid var(--rule);font-family:var(--font-mono);}
  .hd .id{font-size:9.5px;letter-spacing:0.1em;text-transform:uppercase;color:var(--gray-2);}
  .hd .co{font-size:9.5px;color:var(--blue);}
  .bd{padding:12px 12px 6px;}
  .num{font-family:var(--font-display);font-weight:200;font-size:48px;line-height:1;color:var(--ink);letter-spacing:-0.02em;}
  .num small{font-size:18px;font-weight:300;color:var(--gray-1);}
  .lbl{font-size:12px;color:var(--gray-1);margin-top:6px;}
  .src{display:flex;align-items:center;gap:6px;padding:7px 10px;border-top:1px solid var(--rule-faint);font-family:var(--font-mono);font-size:9px;letter-spacing:0.08em;text-transform:uppercase;color:var(--gray-3);}
  .src::before{content:"";width:5px;height:5px;background:var(--blue);flex:none;}
</style>
</head>
<body>
  <div class="wrap">
    <div class="cell">
      <div class="hd"><span class="id">Cell A·01</span><span class="co">42.36 / 71.05</span></div>
      <div class="bd"><div class="num">2.4<small>×</small></div><div class="lbl">Throughput vs. baseline period</div></div>
      <div class="src">Source · internal telemetry · SRC-2087</div>
    </div>
    <div class="cell">
      <div class="hd"><span class="id">Cell A·02</span><span class="co">verified</span></div>
      <div class="bd"><div class="num">94<small>%</small></div><div class="lbl">Findings corroborated by 2+ sources</div></div>
      <div class="src">Source · audit panel · n=412</div>
    </div>
  </div>
</body>
</html>
