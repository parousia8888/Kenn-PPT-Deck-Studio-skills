<!-- @dsCard group="Type" viewport="700x180" name="Display — Manrope Light" subtitle="Large, light-weight numerals are the system's signature" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--paper-0);}
  .wrap{padding:20px 24px;display:flex;align-items:flex-end;gap:28px;}
  .num{font-family:var(--font-display);font-weight:200;font-size:118px;line-height:0.9;letter-spacing:-0.03em;color:var(--ink);}
  .num small{font-weight:300;font-size:38px;color:var(--gray-1);letter-spacing:-0.01em;}
  .meta{font-family:var(--font-mono);font-size:10.5px;letter-spacing:0.1em;text-transform:uppercase;color:var(--gray-2);line-height:1.9;border-left:1px solid var(--rule);padding-left:16px;}
  .meta b{color:var(--ink);font-weight:500;}
</style>
</head>
<body>
  <div class="wrap">
    <div class="num">84.2<small>%</small></div>
    <div class="meta">
      Manrope · weight 200<br>
      <b>132 / 92 / 64 / 44</b> px<br>
      tracking −0.02em<br>
      use: cover · KPI · finding
    </div>
  </div>
</body>
</html>
